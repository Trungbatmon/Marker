<!DOCTYPE html>
<html>
<head><title>Generate Marker PWA Icons</title></head>
<body style="background:#1a1a1a;color:#fff;font-family:sans-serif;padding:20px">
<h2>Marker — Icon Generator</h2>
<p>Click each button to download the icon at that size.</p>
<div id="buttons" style="display:flex;gap:10px;flex-wrap:wrap;margin:20px 0"></div>
<canvas id="canvas" style="display:none"></canvas>
<div id="preview" style="display:flex;gap:20px;flex-wrap:wrap;margin-top:20px"></div>

<script>
const sizes = [48, 72, 96, 128, 144, 152, 192, 384, 512];
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function drawIcon(size) {
    canvas.width = size;
    canvas.height = size;
    
    // Gradient background
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#3b82f6');
    grad.addColorStop(1, '#8b5cf6');
    
    // Rounded rect
    const r = size * 0.21;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    
    // Document icon
    const s = size * 0.12;
    const cx = size / 2;
    const cy = size / 2;
    
    ctx.strokeStyle = 'white';
    ctx.lineWidth = size * 0.04;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    // Document body
    const dw = size * 0.45;
    const dh = size * 0.55;
    const dx = cx - dw/2;
    const dy = cy - dh/2;
    const fold = size * 0.12;
    
    ctx.beginPath();
    ctx.moveTo(dx + fold, dy);
    ctx.lineTo(dx, dy);
    ctx.lineTo(dx, dy + dh);
    ctx.lineTo(dx + dw, dy + dh);
    ctx.lineTo(dx + dw, dy + fold);
    ctx.lineTo(dx + dw - fold, dy);
    ctx.closePath();
    ctx.stroke();
    
    // Fold
    ctx.beginPath();
    ctx.moveTo(dx + dw - fold, dy);
    ctx.lineTo(dx + dw - fold, dy + fold);
    ctx.lineTo(dx + dw, dy + fold);
    ctx.stroke();
    
    // Checkmark
    ctx.lineWidth = size * 0.055;
    ctx.beginPath();
    ctx.moveTo(cx - dw * 0.22, cy + dh * 0.1);
    ctx.lineTo(cx - dw * 0.05, cy + dh * 0.25);
    ctx.lineTo(cx + dw * 0.28, cy - dh * 0.1);
    ctx.stroke();
    
    return canvas.toDataURL('image/png');
}

sizes.forEach(size => {
    const btn = document.createElement('button');
    btn.textContent = `${size}x${size}`;
    btn.style.cssText = 'padding:8px 16px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px';
    btn.onclick = () => {
        const dataUrl = drawIcon(size);
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `icon-${size}.png`;
        a.click();
    };
    document.getElementById('buttons').appendChild(btn);
    
    // Preview
    const dataUrl = drawIcon(size);
    const img = document.createElement('img');
    img.src = dataUrl;
    img.style.cssText = `width:${Math.min(size,128)}px;height:${Math.min(size,128)}px;border-radius:12px`;
    img.title = `${size}x${size}`;
    document.getElementById('preview').appendChild(img);
});

// Auto-generate key sizes
[192, 512].forEach(size => {
    const dataUrl = drawIcon(size);
    // Show download link
    const link = document.createElement('a');
    link.href = dataUrl;
    link.download = `icon-${size}.png`;
    link.textContent = ` [Auto-download icon-${size}.png]`;
    link.style.color = '#10b981';
    document.getElementById('buttons').appendChild(link);
});
</script>
</body>
</html>
